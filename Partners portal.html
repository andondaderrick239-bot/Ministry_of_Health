<!DOCTYPE hmtl>
<html>
<head>
<meta charset="utf-18">
<meta name="viewport" content="width=width-device, initial-scale=1.0">
<title>Partners portal</title>
<link rel="stylesheet" href="style.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    min-height:100vh;
}

/* Left Side */

.left{
    background:linear-gradient(135deg,#f6f8fc,#dfe7f6);
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:60px;
    line-height:1.15;
    font-weight:800;
    color:#111827;
}

.left h1 span{
    color:#2563eb;
}

.left p{
    margin-top:25px;
    color:#52627d;
    font-size:24px;
    line-height:1.7;
}

.image-card{
    margin-top:60px;
    background:#fff;
    border-radius:25px;
    padding:20px;
    width:90%;
    box-shadow:0 15px 30px rgba(0,0,0,.08);
}

.image-card img{
    width:100%;
    border-radius:20px;
}

.footer{
    margin-top:15px;
    color:#98a4b5;
    font-size:14px;
}

/* Right Side */

.right{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
}

.right-image{
    width:90%;
    max-width:700px;
    height:auto;
}.login-box{
    width:75%;
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo small{
    color:#444;
    font-size:13px;
}

.login-box h2{
    font-size:48px;
    margin-bottom:20px;
    color:#111827;
}

.login-box p{
    color:#5b6b82;
    margin-bottom:35px;
    font-size:20px;
}

.input-box{
    margin-bottom:25px;
}

.input-box input{
    width:100%;
    padding:20px;
    font-size:18px;
    border:2px solid #dce3ef;
    border-radius:16px;
    outline:none;
}

.input-box input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    background:#2358e8;
    color:#fff;
    border:none;
    padding:18px;
    border-radius:16px;
    font-size:24px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#1b49c6;
}

.forgot{
    display:block;
    text-align:right;
    margin:20px 0 40px;
    color:#2358e8;
    text-decoration:none;
    font-weight:500;
}

.download{
    border:1px solid #dbe2ef;
    border-radius:18px;
    padding:25px;
}

.download h3{
    font-size:22px;
    margin-bottom:10px;
}

.download p{
    font-size:16px;
    margin:10px 0;
}

.play{
    margin-top:15px;
    display:inline-block;
    background:#000;
    color:#fff;
    text-decoration:none;
    padding:14px 22px;
    border-radius:12px;
}

.bottom{
    text-align:center;
    margin-top:30px;
    color:#9aa3b1;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

.left{
display:none;
}

.login-box{
width:90%;
padding:30px 0;
}

.login-box h2{
font-size:34px;
}
}
</style>

</head>
<body>

<div class="container">
<!-- Left -->
<div class="left">
<img src="MOH coat.png" alt="MOH coat" width="100">
<h1>
<span>Ministry of Health Uganda</span>
Partners Portal
</h1>

<p>
<b>Sign in</b>

<br>
Use your email/username and password.
</p>
<div class="input-box">
<input type="text" placeholder="Enter email or username">
</div>
<div class="input-box password-box">

    <input type="password" id="password" placeholder="Password">

   

</div><button>Sign in</button>
<a href="#" class="forgot">Forgot Password?</a>

<p>
Partner Registration . Contact Us</p>

</div> <!-- End of left section -->

<!-- Right Section -->
<div class="right">

    <img src="headquarters.png" alt="Headquarters" class="right-image" width="1000">

</div>
</body>
</html>
