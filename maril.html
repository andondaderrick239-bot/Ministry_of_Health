<!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family: Arial, sans-serif;
    background:#fff;
    margin:0;
}

.container{
    width:80%;
    margin:40px auto;
}

/* Search area */
.search-box{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:40px;
}

.search-box input{
    width:60%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:5px;
    font-size:16px;
}

.search-box button{
    background:#444;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:5px;
}


/* Newsletter cards */
.newsletter{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid #eee;
    padding:20px;
    margin:15px 0;
    box-shadow:0 2px 5px #ddd;
}

.info{
    display:flex;
    align-items:center;
    gap:20px;
}

.pdf{
    width:45px;
    height:55px;
    background:#d9534f;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

h3{
    color:#1976d2;
    margin:0;
}

small{
    color:gray;
}

.download{
    background:#1976d2;
    color:white;
    padding:10px 25px;
    border-radius:4px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="search-box">
<input type="text" placeholder="Search Keyword...">
<button>Apply Filter</button>
</div>

</html>
